name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python pin ${{ matrix.python-version }}

      - name: Install dependencies (all extras + dev)
        run: uv sync --all-extras --dev

      - name: Lint (ruff)
        run: uv run ruff check engine/ ui/ data/ storage/ tests/ app.py

      - name: Format Check (ruff)
        run: uv run ruff format --check engine/ ui/ data/ storage/ tests/ app.py

      - name: Test (pytest)
        run: uv run pytest tests/ -v --tb=short -q

  # Optional: run core tests only (no optional deps) for fast feedback
  core-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Set up Python 3.12
        run: uv python pin 3.12

      - name: Install core dependencies only
        run: uv sync --dev

      - name: Core Tests (no optional deps)
        run: uv run pytest tests/test_risk.py tests/test_scoring.py tests/test_optimization.py tests/test_regime.py tests/test_scenario.py tests/test_factors.py tests/test_fundamentals.py tests/test_backtesting.py tests/test_garch_var.py tests/test_portfolio.py tests/test_benchmark.py -v --tb=short -q